services:
  webhook:
    container_name: "webhook-site"
    image: "ghcr.io/smart-layer/webhook.site:latest"
    # Enable build for development:
    # build:
    #   dockerfile: Dockerfile
    #   context: ./
    command: php artisan queue:work --daemon --tries=3 --timeout=10
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://webhook-site.smartlayer.dev
      - APP_LOG=errorlog
      - DB_CONNECTION=sqlite
      - REDIS_HOST=redis
      - BROADCAST_DRIVER=redis
      - CACHE_DRIVER=redis
      - QUEUE_DRIVER=redis
      - ECHO_HOST_MODE=path
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webhook-site.rule=Host(`webhook-site.smartlayer.dev`)"
      - "traefik.http.routers.webhook-site.entrypoints=websecure"
      - "traefik.http.routers.webhook-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.webhook-site.loadbalancer.server.port=80"
    networks:
      - traefik-public
      - default

  redis:
    container_name: "webhook-redis"
    image: "redis:alpine"

  laravel-echo-server:
    container_name: "laravel-echo-server"
    image: "webhooksite/laravel-echo-server"
    command:
      - exec
      - laravel-echo-server
      - start
      - --force
    environment:
      - LARAVEL_ECHO_SERVER_AUTH_HOST=http://webhook
      - LARAVEL_ECHO_SERVER_HOST=0.0.0.0
      - LARAVEL_ECHO_SERVER_PORT=6001
      - ECHO_REDIS_PORT=6379
      - ECHO_REDIS_HOSTNAME=redis
      - ECHO_PROTOCOL=http
      - ECHO_ALLOW_CORS=true
      - ECHO_ALLOW_ORIGIN=*
      - ECHO_ALLOW_METHODS=*
      - ECHO_ALLOW_HEADERS=*

networks:
  traefik-public:
    external: true
